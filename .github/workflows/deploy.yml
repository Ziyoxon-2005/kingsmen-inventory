name: Deploy to Amazon ECS

on:
  push:
    branches: [ "main" ]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: kingsmen-inventory
  ECS_SERVICE: kingsmen-service-v2
  ECS_CLUSTER: kingsmen-cluster-new
  ECS_TASK_DEFINITION: kingsmen-inventory
  CONTAINER_NAME: kingsmen-container
  VPC_SUBNET: ${{ secrets.VPC_SUBNET }}
  SECURITY_GROUP: ${{ secrets.SECURITY_GROUP }}

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.8'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8==7.1.2
        
    - name: Run linting
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        
  test:
    name: Run Tests
    needs: lint
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.8'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Create static directory
      run: |
        mkdir -p test_static test_media
        
    - name: Run tests
      env:
        DJANGO_SETTINGS_MODULE: inventoryproject.test_settings
        SECRET_KEY: test-key-for-ci
        DEBUG: 'True'
        ALLOWED_HOSTS: localhost,127.0.0.1
      run: |
        python manage.py makemigrations
        python manage.py migrate
        python manage.py collectstatic --noinput --settings=inventoryproject.test_settings
        python manage.py test --settings=inventoryproject.test_settings
        
  deploy:
    name: Deploy
    needs: test
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Check AWS VPC Configuration
      run: |
        echo "Checking VPC configuration..."
        
        # List all VPCs
        echo "Available VPCs:"
        aws ec2 describe-vpcs --region ${{ env.AWS_REGION }} --query 'Vpcs[*].{VpcId:VpcId,CidrBlock:CidrBlock,Name:Tags[?Key==`Name`].Value|[0]}' --output table
        
        # List all subnets
        echo "Available Subnets:"
        aws ec2 describe-subnets --region ${{ env.AWS_REGION }} --query 'Subnets[*].{SubnetId:SubnetId,VpcId:VpcId,AvailabilityZone:AvailabilityZone,CidrBlock:CidrBlock}' --output table
        
        # List security groups
        echo "Available Security Groups:"
        aws ec2 describe-security-groups --region ${{ env.AWS_REGION }} --query 'SecurityGroups[*].{GroupId:GroupId,GroupName:GroupName,VpcId:VpcId}' --output table
        
        # Get default VPC subnets
        echo "Default VPC Subnets:"
        DEFAULT_VPC_ID=$(aws ec2 describe-vpcs --region ${{ env.AWS_REGION }} --filters "Name=isDefault,Values=true" --query 'Vpcs[0].VpcId' --output text)
        if [ ! -z "$DEFAULT_VPC_ID" ]; then
          aws ec2 describe-subnets --region ${{ env.AWS_REGION }} --filters "Name=vpc-id,Values=$DEFAULT_VPC_ID" --query 'Subnets[*].{SubnetId:SubnetId,AvailabilityZone:AvailabilityZone}' --output table
        else
          echo "No default VPC found"
        fi

    - name: Install AWS CLI v2
      run: |
        echo "Installing AWS CLI version 2..."
        curl -sL "https://d1vvhvl2y92vvt.cloudfront.net/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
        unzip -q awscliv2.zip
        sudo ./aws/install --update
        aws --version
        echo "AWS CLI installation completed"

    - name: Install jq
      run: |
        echo "Installing jq..."
        sudo apt-get update
        sudo apt-get install -y jq
        jq --version
        echo "jq installation completed"

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2
      with:
        mask-password: true

    - name: Build and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        echo "Starting Docker build and push process..."
        echo "Registry: $ECR_REGISTRY"
        echo "Repository: ${{ env.ECR_REPOSITORY }}"
        
        # Build the Docker image with optimized layers
        docker build --no-cache --pull -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG .
        
        # Push the image to ECR
        docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG
        
        # Set output using the new environment file syntax
        echo "image=$ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG" >> $GITHUB_ENV
        
        echo "Docker build and push completed successfully"

    - name: Fill in the new image ID in the Amazon ECS task definition
      id: task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: task-definition.json
        container-name: ${{ env.CONTAINER_NAME }}
        image: ${{ env.image }}

    - name: Deploy to Amazon ECS
      run: |
        # Register new task definition
        echo "Registering new task definition..."
        TASK_DEFINITION=$(aws ecs register-task-definition \
          --cli-input-json file://${{ steps.task-def.outputs.task-definition }} \
          --region ${{ env.AWS_REGION }} \
          --query 'taskDefinition.taskDefinitionArn' \
          --output text)
        
        echo "New task definition: $TASK_DEFINITION"
        
        # Update service with new task definition
        echo "Updating service..."
        aws ecs update-service \
          --cluster ${{ env.ECS_CLUSTER }} \
          --service ${{ env.ECS_SERVICE }} \
          --task-definition $TASK_DEFINITION \
          --network-configuration "awsvpcConfiguration={subnets=[${{ env.VPC_SUBNET }}],securityGroups=[${{ env.SECURITY_GROUP }}],assignPublicIp=ENABLED}" \
          --force-new-deployment \
          --region ${{ env.AWS_REGION }}
        
        # Wait for service to stabilize
        echo "Waiting for service to stabilize..."
        aws ecs wait services-stable \
          --cluster ${{ env.ECS_CLUSTER }} \
          --services ${{ env.ECS_SERVICE }} \
          --region ${{ env.AWS_REGION }}

    - name: Verify deployment
      if: success()
      run: |
        echo "Checking service status..."
        aws ecs describe-services \
          --cluster ${{ env.ECS_CLUSTER }} \
          --services ${{ env.ECS_SERVICE }} \
          --region ${{ env.AWS_REGION }} > service_status.json
        
        # Get service details
        running_count=$(cat service_status.json | jq -r '.services[0].runningCount')
        desired_count=$(cat service_status.json | jq -r '.services[0].desiredCount')
        deployment_status=$(cat service_status.json | jq -r '.services[0].deployments[0].status')
        deployment_id=$(cat service_status.json | jq -r '.services[0].deployments[0].id')
        
        echo "Service Status:"
        echo "Running Count: $running_count"
        echo "Desired Count: $desired_count"
        echo "Deployment Status: $deployment_status"
        echo "Deployment ID: $deployment_id"
        
        # Check task status
        echo "Checking task status..."
        aws ecs list-tasks \
          --cluster ${{ env.ECS_CLUSTER }} \
          --service ${{ env.ECS_SERVICE }} \
          --region ${{ env.AWS_REGION }} > tasks.json
        
        task_arns=$(cat tasks.json | jq -r '.taskArns[]')
        
        if [ ! -z "$task_arns" ]; then
          for task_arn in $task_arns; do
            echo "Getting details for task: $task_arn"
            aws ecs describe-tasks \
              --cluster ${{ env.ECS_CLUSTER }} \
              --tasks $task_arn \
              --region ${{ env.AWS_REGION }} > task_details.json
            
            task_status=$(cat task_details.json | jq -r '.tasks[0].lastStatus')
            container_status=$(cat task_details.json | jq -r '.tasks[0].containers[0].lastStatus')
            
            echo "Task Status: $task_status"
            echo "Container Status: $container_status"
          done
        else
          echo "No tasks found for the service"
        fi 