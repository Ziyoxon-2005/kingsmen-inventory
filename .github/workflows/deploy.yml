name: Deploy to Amazon ECS

on:
  push:
    branches: [ "main" ]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: kingsmen-inventory
  ECS_SERVICE: kingsmen-service-v2
  ECS_CLUSTER: kingsmen-cluster-new
  ECS_TASK_DEFINITION: kingsmen-inventory
  CONTAINER_NAME: kingsmen-container

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.8'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8==7.1.2
        
    - name: Run linting
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        
  test:
    name: Run Tests
    needs: lint
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.8'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Create static directory
      run: |
        mkdir -p test_static test_media
        
    - name: Run tests
      env:
        DJANGO_SETTINGS_MODULE: inventoryproject.test_settings
        SECRET_KEY: test-key-for-ci
        DEBUG: 'True'
        ALLOWED_HOSTS: localhost,127.0.0.1
      run: |
        python manage.py makemigrations
        python manage.py migrate
        python manage.py collectstatic --noinput --settings=inventoryproject.test_settings
        python manage.py test --settings=inventoryproject.test_settings
        
  deploy:
    name: Deploy
    needs: test
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Install AWS CLI v2
      run: |
        echo "Installing AWS CLI version 2..."
        curl -sL "https://d1vvhvl2y92vvt.cloudfront.net/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
        unzip -q awscliv2.zip
        sudo ./aws/install --update
        aws --version
        echo "AWS CLI installation completed"

    - name: Install jq
      run: |
        echo "Installing jq..."
        sudo apt-get update
        sudo apt-get install -y jq
        jq --version
        echo "jq installation completed"

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2
      with:
        mask-password: true

    - name: Build and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        echo "Starting Docker build and push process..."
        echo "Registry: $ECR_REGISTRY"
        echo "Repository: ${{ env.ECR_REPOSITORY }}"
        
        # Build the Docker image with optimized layers
        docker build --no-cache --pull -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG .
        
        # Push the image to ECR
        docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG
        
        # Set output using the new environment file syntax
        echo "image=$ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG" >> $GITHUB_ENV
        
        echo "Docker build and push completed successfully"

    - name: Fill in the new image ID in the Amazon ECS task definition
      id: task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: task-definition.json
        container-name: ${{ env.CONTAINER_NAME }}
        image: ${{ env.image }}

    - name: Deploy Amazon ECS task definition
      uses: aws-actions/amazon-ecs-deploy-task-definition@v1
      with:
        task-definition: ${{ steps.task-def.outputs.task-definition }}
        service: ${{ env.ECS_SERVICE }}
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: false
        force-new-deployment: true
        enable-circuit-breaker: true
        enable-rollback: true
        wait-for-minutes: 2
        deployment-configuration: '{"deploymentCircuitBreaker":{"enable":true,"rollback":true},"maximumPercent":100,"minimumHealthyPercent":0}'

    - name: Verify deployment
      if: success()
      run: |
        echo "Waiting for service to stabilize..."
        attempt=1
        max_attempts=5
        
        while [ $attempt -le $max_attempts ]; do
          echo "Attempt $attempt of $max_attempts"
          
          # Check service status
          echo "Checking service status..."
          aws ecs describe-services \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --region ${{ env.AWS_REGION }} > service_status.json
          
          # Get service details
          running_count=$(cat service_status.json | jq -r '.services[0].runningCount')
          desired_count=$(cat service_status.json | jq -r '.services[0].desiredCount')
          deployment_status=$(cat service_status.json | jq -r '.services[0].deployments[0].status')
          deployment_id=$(cat service_status.json | jq -r '.services[0].deployments[0].id')
          
          echo "Deployment Status: $deployment_status"
          echo "Deployment ID: $deployment_id"
          
          # Check task status
          echo "Checking task status..."
          aws ecs list-tasks \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --region ${{ env.AWS_REGION }} > tasks.json
          
          task_arns=$(cat tasks.json | jq -r '.taskArns[]' 2>/dev/null)
          
          if [ ! -z "$task_arns" ]; then
            for task_arn in $task_arns; do
              echo "Getting details for task: $task_arn"
              aws ecs describe-tasks \
                --cluster ${{ env.ECS_CLUSTER }} \
                --tasks $task_arn \
                --region ${{ env.AWS_REGION }} > task_details.json
              
              task_status=$(cat task_details.json | jq -r '.tasks[0].lastStatus')
              task_stopped_reason=$(cat task_details.json | jq -r '.tasks[0].stoppedReason // "Not stopped"')
              container_status=$(cat task_details.json | jq -r '.tasks[0].containers[0].lastStatus')
              container_exit_code=$(cat task_details.json | jq -r '.tasks[0].containers[0].exitCode // "Not exited"')
              
              echo "Task Status: $task_status"
              echo "Task Stopped Reason: $task_stopped_reason"
              echo "Container Status: $container_status"
              echo "Container Exit Code: $container_exit_code"
            done
          else
            echo "No tasks found for the service"
          fi
          
          if [ "$running_count" -eq "$desired_count" ]; then
            echo "Service is stable! Running count matches desired count ($running_count/$desired_count)"
            exit 0
          fi
          
          echo "Service not yet stable. Running: $running_count, Desired: $desired_count"
          
          if [ $attempt -eq $max_attempts ]; then
            echo "Service failed to stabilize after $max_attempts attempts"
            echo "Checking CloudWatch logs for container insights..."
            
            # Get CloudWatch logs
            aws logs get-log-events \
              --log-group-name "/aws/ecs/${{ env.ECS_CLUSTER }}" \
              --log-stream-name "ecs/kingsmen-container/$deployment_id" \
              --region ${{ env.AWS_REGION }} > container_logs.json || true
            
            echo "Recent container logs:"
            cat container_logs.json | jq -r '.events[].message' || echo "No logs available"
            
            exit 1
          fi
          
          echo "Waiting 60 seconds before next attempt..."
          attempt=$((attempt + 1))
          sleep 60
        done 